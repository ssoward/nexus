services:
  caddy:
    image: caddy:2.8-alpine
    environment:
      # Hostname Caddy serves (site address + cert filename). Set NEXUS_HOST in
      # .env on machines other than M1 (e.g. ssowardm5.tail040188.ts.net).
      NEXUS_HOST: ${NEXUS_HOST:-ssowardm1.tail040188.ts.net}
    ports:
      # Defaults to 443; on hosts that can't reliably bind privileged ports
      # (e.g. macOS + colima), set CADDY_HOST_PORT=8443 in .env and front it
      # with: tailscale serve --tcp=443 tcp://localhost:8443
      - "${CADDY_HOST_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./frontend/dist:/srv:ro
      - ./certs:/certs:ro
      - caddy-data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  caddy-data:
