# Nexus configuration - non-secret values only
# Secrets (APP_SECRET, JWT_SECRET, CRYPTO_SALT) must be set as environment variables

app:
  max_panes: 6
  log_level: INFO
  db_path: ~/.nexus/nexus.db

session:
  idle_timeout_seconds: 86400
  jwt_expire_minutes: 1440

presets:
  - name: bash
    command: ["/bin/bash", "-l"]
    description: Login shell

  - name: zsh
    command: ["/bin/zsh", "-l"]
    description: Zsh login shell

  - name: claude
    command: ["claude"]
    description: Claude Code CLI

  - name: python
    command: ["python3"]
    description: Python 3 REPL

webauthn:
  rp_id: ssowardm5.tail040188.ts.net
  rp_name: Nexus
