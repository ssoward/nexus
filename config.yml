# Nexus configuration - non-secret values only
# Secrets (APP_SECRET, JWT_SECRET, CRYPTO_SALT) must be set as environment variables

app:
  max_panes: 6
  log_level: INFO
  db_path: ~/.nexus/nexus.db

session:
  jwt_expire_minutes: 525600  # 365 days — slid forward on every refresh, so sessions only end on explicit logout
  absolute_max_hours: 0       # 0 = disabled. If > 0, force a fresh login this many hours after the ORIGINAL
                              # login regardless of refreshes — a hard ceiling on how long a stolen cookie is usable.

recovery:
  enabled: true    # serialize session ring buffers on graceful shutdown and replay after restart
  ttl_hours: 24    # discard the recovery file if the backend was down longer than this

presets:
  - name: bash
    command: ["/bin/bash", "-l"]
    description: Login shell

  - name: zsh
    command: ["/bin/zsh", "-l"]
    description: Zsh login shell

  - name: claude
    command: ["claude"]
    description: Claude Code CLI

  - name: python
    command: ["python3"]
    description: Python 3 REPL

webauthn:
  rp_id: ssowardm1.tail040188.ts.net
  rp_name: Nexus
  origin: https://ssowardm1.tail040188.ts.net
